version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    env_file:
      - .env
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - GENERIC_TIMEZONE=Asia/Taipei
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - BRAVE_SEARCH_API_KEY_FILE=/home/node/.n8n/bravesearch-key
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/backups/bravesearch-key:/home/node/.n8n/bravesearch-key:ro
    restart: unless-stopped
    depends_on:
      - qdrant
    networks:
      - bot-network

  whatsapp-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bridge
    ports:
      - "3000:3000"
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/whatsapp-trigger
      - TARGET_GROUP_NAMES=Private Wutsapp Group,珍•Marathon Part-time•珠
      - MEMORY_LIMIT=10
      - AI_OUTBOX_LOG_PATH=/app/session/ai-outbox.jsonl
      - GROUP_SETTINGS_PATH=/app/session/group-settings.json
      - ENABLE_GROUPS_ENDPOINT=true
    volumes:
      - whatsapp_session:/app/session
    restart: unless-stopped
    depends_on:
      - n8n
      - qdrant
    networks:
      - bot-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - bot-network

volumes:
  n8n_data:
  whatsapp_session:
  qdrant_storage:

networks:
  bot-network:
    driver: bridge
